<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register - Plant Disease Detection</title>
<style>
* {margin:0; padding:0; box-sizing:border-box; font-family:'Segoe UI', sans-serif;}
html, body {height:100%; overflow:hidden;}
#bg-video {position:fixed; top:0; left:0; width:100%; height:100%; object-fit:cover; z-index:-2;}
.overlay {position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.4); z-index:-1;}
.container {display:flex; justify-content:center; align-items:center; height:100%; width:100%; position:relative; z-index:1;}
.form-box {backdrop-filter: blur(15px) saturate(180%) contrast(120%) brightness(110%); background: rgba(255,255,255,0.1); border-radius: 20px; border: 1px solid rgba(255,255,255,0.2); padding:50px 40px; max-width:400px; width:90%; text-align:center; box-shadow: 0 8px 32px rgba(0,0,0,0.3); animation: fadeIn 1s ease forwards;}
h2 {color:#e0f7da; margin-bottom:30px; font-size:2em;}
.input-group {position:relative; margin-bottom:25px;}
input {width:100%; padding:14px 16px; border:none; border-radius:12px; background: rgba(255,255,255,0.15); color:#fff; font-size:16px; outline:none; transition:0.3s;}
input::placeholder {color: rgba(255,255,255,0.7);}
input:focus {background: rgba(255,255,255,0.25);}
label {position:absolute; top:50%; left:16px; transform:translateY(-50%); color: rgba(255,255,255,0.7); pointer-events:none; font-size:16px; transition:0.3s; background: rgba(255,255,255,0.1); padding:0 5px;}
input:focus + label,
input:not(:placeholder-shown) + label {top:-10px; font-size:13px; color:#a5ff90;}
button {width:100%; padding:14px; border:none; border-radius:12px; background: linear-gradient(135deg, #27ae60, #1e8449); color:#fff; font-size:16px; cursor:pointer; transition:0.3s; font-weight:bold;}
button:hover {transform:scale(1.05);}
p {margin-top:20px; color:#e0f7da; font-size:14px;}
p a {color:#a5ff90; text-decoration:none; font-weight:bold; transition:0.3s;}
p a:hover {color:#7ee07f; text-decoration:underline;}
.flash-message {margin-top:12px; padding:10px; border-radius:10px; background: rgba(255,0,0,0.2); color:#ff4d4d; font-size:14px; animation: slideDown 0.5s ease forwards;}
@keyframes fadeIn {0% {opacity:0; transform:translateY(-20px);} 100% {opacity:1; transform:translateY(0);}}
@keyframes slideDown {0% {opacity:0; transform:translateY(-10px);} 100% {opacity:1; transform:translateY(0);}}
</style>
</head>
<body>
<video autoplay muted loop id="bg-video">
    <source src="{{ url_for('static', filename='1.mp4') }}" type="video/mp4">
</video>
<div class="overlay"></div>
<div class="container">
    <div class="form-box">
        <h2>Register</h2>
        <form method="POST" action="{{ url_for('register') }}">
            <div class="input-group">
                <input type="text" name="username" id="username" placeholder=" " required>
                <label for="username">Username</label>
            </div>
            <div class="input-group">
                <input type="password" name="password" id="password" placeholder=" " required>
                <label for="password">Password</label>
            </div>
            <button type="submit">Register</button>
        </form>
        <p>Already registered? <a href="{{ url_for('login') }}">Login here</a></p>
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% for category, message in messages %}
                <div class="flash-message">{{ message }}</div>
            {% endfor %}
        {% endwith %}
    </div>
</div>
</body>
</html>
