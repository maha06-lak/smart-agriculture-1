<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AgriSmart | Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Inter', sans-serif; 
            margin: 0;
            overflow: hidden; 
        }

        /* High-Quality Harvesting Background with Overlay */
        .bg-harvest {
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(6, 78, 59, 0.5)), 
                        url('https://images.unsplash.com/photo-1594488687399-5b34581f2f7b?auto=format&fit=crop&q=80&w=2000');
            background-size: cover;
            background-position: center;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
        }
        video#bg{
            position:fixed;
            top:0;left:0;
            width:100%;height:100%;
            object-fit:cover;
            z-index:-2;
            }

        .glass-panel {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            transition: all 0.4s ease;
        }

        .module-card:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-8px);
            border-color: #ADFF2F;
            box-shadow: 0 15px 30px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>
    <video id="bg" autoplay muted loop>
    <source src="{{ url_for('static', filename='bg.mp4') }}" type="video/mp4">
    </video>

    <div class="bg-harvest">
        
        <nav class="w-full p-6 flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <div class="w-10 h-10 bg-[#ADFF2F] rounded-lg flex items-center justify-center shadow-lg">
                    <svg viewBox="0 0 24 24" class="w-6 h-6 fill-[#064E3B]" xmlns="http://www.w3.org/2000/svg"><path d="M12 2L4.5 20.29L5.21 21L12 18L18.79 21L19.5 20.29L12 2Z"/></svg>
                </div>
                <span class="text-white font-black text-xl tracking-tighter">AGRIS<span class="text-[#ADFF2F]">MART</span></span>
            </div>

            <div class="glass-panel px-5 py-2 rounded-full flex items-center space-x-6 border border-white/20">
                <div class="flex items-center space-x-3 border-r border-white/20 pr-6">
                    <div class="w-8 h-8 rounded-full bg-green-500 border-2 border-[#ADFF2F] flex items-center justify-center text-xs font-bold text-white uppercase">
                        {{ username[0] if username else 'U' }}
                    </div>
                    <span class="text-white text-sm font-bold tracking-wide">{{ username if username else 'User_Admin' }}</span>
                </div>
                <a href="/logout" class="text-[#ADFF2F] text-xs font-black uppercase tracking-widest hover:text-white transition">
                    Logout 
                    <svg class="w-4 h-4 inline-block ml-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg>
                </a>
            </div>
        </nav>

        <div class="flex-grow flex flex-col items-center justify-center px-6">
            
            <div class="text-center mb-12">
                <h1 class="text-6xl font-black text-white mb-2 uppercase italic tracking-tighter">
                    Operation <span class="text-[#ADFF2F]">Hub</span>
                </h1>
                <p class="text-gray-300 font-bold tracking-[0.3em] text-xs uppercase">Select Sector to Monitor</p>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-3 gap-8 w-full max-w-6xl">
                
                <a href="/irrigation" class="glass-panel module-card p-10 rounded-[2.5rem] group text-center">
                    <div class="w-16 h-16 bg-blue-500/20 rounded-2xl flex items-center justify-center mx-auto mb-6 group-hover:bg-blue-500 transition">
                        <svg class="w-8 h-8 text-blue-400 group-hover:text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
                    </div>
                    <h2 class="text-2xl font-black text-white uppercase tracking-tight">Irrigation</h2>
                    <div class="h-1 w-12 bg-blue-500 mx-auto mt-4 rounded-full"></div>
                </a>

                <a href="/disease" class="glass-panel module-card p-10 rounded-[2.5rem] group text-center border-t-2 border-[#ADFF2F]/30">
                    <div class="w-16 h-16 bg-green-500/20 rounded-2xl flex items-center justify-center mx-auto mb-6 group-hover:bg-green-500 transition">
                        <svg class="w-8 h-8 text-green-400 group-hover:text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg>
                    </div>
                    <h2 class="text-2xl font-black text-white uppercase tracking-tight">Disease Lab</h2>
                    <div class="h-1 w-12 bg-green-500 mx-auto mt-4 rounded-full"></div>
                </a>

                <a href="/soil" class="glass-panel module-card p-10 rounded-[2.5rem] group text-center">
                    <div class="w-16 h-16 bg-orange-500/20 rounded-2xl flex items-center justify-center mx-auto mb-6 group-hover:bg-orange-500 transition">
                        <svg class="w-8 h-8 text-orange-400 group-hover:text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    </div>
                    <h2 class="text-2xl font-black text-white uppercase tracking-tight">Soil Mapping</h2>
                    <div class="h-1 w-12 bg-orange-500 mx-auto mt-4 rounded-full"></div>
                </a>

            </div>
        </div>

        <div class="p-8 text-center">
            <p class="text-white/30 text-[10px] font-black tracking-widest uppercase">
                Active Nodes: 128 • Connectivity: 5G Satellite • Latency: 14ms
            </p>
        </div>

    </div>

</body>
</html>
