<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Access AgriSmart | Portal</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body { font-family: 'Inter', sans-serif; }

.bg-agri {
background: linear-gradient(rgba(6,78,59,0.8), rgba(6,78,59,0.8)),
url('https://images.unsplash.com/photo-1500382017468-9049fed747ef?auto=format&fit=crop&q=80&w=1000');
background-size: cover;
background-position: center;
}

.form-input{
width:100%;
padding:12px;
border-radius:12px;
border:1px solid #e5e7eb;
background:#f9fafb;
}

.hidden-form{
display:none;
}
</style>

</head>

<body class="bg-[#F8FAFC] min-h-screen flex items-center justify-center p-4">

<div class="max-w-5xl w-full bg-white rounded-3xl shadow-2xl overflow-hidden flex flex-col md:flex-row min-h-[700px]">

<!-- LEFT PANEL -->

<div class="md:w-1/2 bg-agri p-12 flex flex-col justify-between text-white">

<div>

<h2 class="text-4xl font-bold mb-6">
Turning Data into <br>
<span class="text-[#ADFF2F]">Green Gold</span>
</h2>

<p class="text-green-100">
AI based farming system for soil detection, disease detection and irrigation.
</p>

</div>

</div>

<!-- RIGHT PANEL -->

<div class="md:w-1/2 p-8 md:p-16 flex flex-col justify-center">

<!-- LOGIN FORM -->

<div id="login-form">

<h3 class="text-3xl font-bold mb-6">Login</h3>

<form action="/login" method="POST" class="space-y-5">

<div>
<label>Username</label>
<input type="text" name="username" placeholder="Enter username" class="form-input" required>
</div>

<div>
<label>Password</label>
<input type="password" name="password" placeholder="Enter password" class="form-input" required>
</div>

<button type="submit" class="w-full bg-[#064E3B] text-[#ADFF2F] py-3 rounded-xl font-bold">
SIGN IN
</button>

</form>

<p class="text-center mt-6 text-sm">
New User?

<button onclick="toggleForm()" class="text-green-700 font-bold">
Create Account
</button>

</p>

</div>

<!-- REGISTER FORM -->

<div id="register-form" class="hidden-form">

<h3 class="text-3xl font-bold mb-6">Register</h3>

<form action="/register" method="POST" class="space-y-4">

<div>

<label>Username</label>

<input type="text"
name="username"
placeholder="Enter username"
class="form-input"
required>

</div>

<div>

<label>Mobile</label>

<input type="text"
name="mobile"
placeholder="Enter mobile"
class="form-input"
required>

</div>

<div>

<label>Email</label>

<input type="email"
name="email"
placeholder="Enter email"
class="form-input"
required>

</div>

<div>

<label>Password</label>

<input type="password"
name="password"
placeholder="Enter password"
class="form-input"
required>

</div>

<button type="submit" class="w-full bg-[#064E3B] text-[#ADFF2F] py-3 rounded-xl font-bold">

CREATE ACCOUNT

</button>

</form>

<p class="text-center mt-6 text-sm">

Already have account?

<button onclick="toggleForm()" class="text-green-700 font-bold">

Login

</button>

</p>

</div>

</div>

</div>

<script>

function toggleForm(){

document.getElementById("login-form").classList.toggle("hidden-form");

document.getElementById("register-form").classList.toggle("hidden-form");

}

</script>

</body>
</html>
